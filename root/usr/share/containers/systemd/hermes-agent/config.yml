credentials-file: /etc/cloudflared/credentials.json
ingress:
  # OpenAI-compatible API, via caddy
  - path: ^/v1/
    service: http://localhost:8080
    originRequest:
      access: *cf_access
  # The dashboard binds 127.0.0.1:9119 inside this pod. Gate every request
  # behind Cloudflare Access — it stores API keys and has no auth of its own.
  - service: http://localhost:9119
    originRequest:
      access: *cf_access
