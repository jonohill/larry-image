# Plex's rclone cache (RCLONE_MOUNT_CACHE_DIR=/caches/rclone_plex) is bind-mounted
# from /tmp/caches/plex. /tmp is tmpfs and is recreated empty on every boot, and
# podman 5 will not auto-create a missing bind-mount source, so plex.service fails
# with "statfs /tmp/caches/plex: no such file or directory" unless we recreate it.
d /tmp/caches 0755 root root -
d /tmp/caches/plex 0755 root root -
